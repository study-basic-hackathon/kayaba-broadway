<div class="layout">
  <main class="main">
    <div class="card">
      @if (isLoading()) {
        <div class="state">
          <div class="spinner"></div>
          <p class="state-msg">決済を確認中...</p>
        </div>
      } @else if (error()) {
        <div class="state">
          <p class="state-icon">❌</p>
          <p class="state-msg error">{{ error() }}</p>
        </div>
      } @else {
        <div class="success">
          <p class="check">✓</p>
          <h1>ご購入ありがとうございます</h1>
          <p class="subtitle">以下のコンテンツをダウンロードしました</p>

          <div class="product-list">
            @for (product of products(); track product.id) {
              <div class="product-item">
                <div class="product-info">
                  <p class="product-name">{{ product.name }}</p>
                  <p class="product-price">¥{{ product.price.toLocaleString() }}</p>
                </div>
                <span class="download-badge">📥 ダウンロード済み</span>
              </div>
            }
          </div>

          <button class="btn-game" (click)="goToGame()">ゲーム画面へ進む</button>
        </div>
      }
    </div>
  </main>
</div>
