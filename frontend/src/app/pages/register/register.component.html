<div class="container">
  <form class="card" (ngSubmit)="onSubmit()" #loginForm="ngForm">
    <h1>アカウント作成</h1>

    <div class="field">
      <label>ニックネーム<span class="required">*</span></label>
      <input
        type="text"
        [(ngModel)]="displayName"
        name="display_name"
        placeholder="太郎"
        required
        #displayNameField="ngModel"
      />
      <p class="error" *ngIf="displayNameField.invalid && displayNameField.touched">
        <span *ngIf="displayNameField.errors?.['required']">ニックネームを入力してください</span>
      </p>
    </div>

    <div class="field">
      <label>メールアドレス<span class="required">*</span></label>
      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        placeholder="xxxxxx@mail.com"
        required
        email
        #emailField="ngModel"
      />
      <p class="error" *ngIf="emailField.invalid && emailField.touched">
        <span *ngIf="emailField.errors?.['required']">メールアドレスを入力してください</span>
        <span *ngIf="emailField.errors?.['email']">メールアドレスの形式が正しくありません</span>
      </p>
    </div>

    <div class="field">
      <label>パスワード<span class="required">*</span></label>
      <input
        type="password"
        [(ngModel)]="password"
        name="password"
        placeholder="xxxxxx"
        required
        #passwordField="ngModel"
      />
      <p class="error" *ngIf="passwordField.invalid && passwordField.touched">
        <span *ngIf="passwordField.errors?.['required']">パスワードを入力してください</span>
      </p>
    </div>

    <div class="field">
      <label>確認用パスワード<span class="required">*</span></label>
      <input
        type="password"
        [(ngModel)]="confirmPassword"
        name="confirm_password"
        placeholder="xxxxxx"
        required
        #confirmPasswordField="ngModel"
      />
      <p class="error" *ngIf="confirmPasswordField.touched">
        <span *ngIf="confirmPasswordField.errors?.['required']">パスワードを入力してください</span>
        <span *ngIf="!confirmPasswordField.errors?.['required'] && password !== confirmPassword">
          パスワードが一致しません
        </span>
      </p>
    </div>

    <button
      type="submit"
      [disabled]="loginForm.invalid || isLoading() || password !== confirmPassword"
      [class.loading]="isLoading()"
    >
      {{ isLoading() ? '作成中' : '作成する' }}
    </button>
    <a routerLink="/login">アカウントが既にある場合</a>
  </form>
</div>
