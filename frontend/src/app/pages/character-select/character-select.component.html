<div class="page">
    <h1 class="title">CHARACTER SELECT</h1>

    <div class="grid">
        <button class="character-card" *ngFor="let character of characters" (click)="selectCharacter(character.id)">
            <img class="character-image" [src]="character.image" [alt]="character.name" />

            <div class="character-name">
                {{ character.name }}
            </div>
        </button>
    </div>
</div>
